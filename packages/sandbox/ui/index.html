<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZAIKit Sandbox</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
    </style>
    <script>
      (() => {
        var stored = localStorage.getItem('zaikit-sandbox-color-mode');
        var mode = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (mode === 'dark') document.documentElement.style.backgroundColor = '#121212';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
