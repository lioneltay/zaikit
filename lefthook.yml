pre-commit:
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm biome check --staged --write --no-errors-on-unmatched
      stage_fixed: true
    check-types:
      run: pnpm check-types

commit-msg:
  commands:
    strip-co-author:
      run: "sed -i '' '/^Co-Authored-By: Claude/d' {1}"
